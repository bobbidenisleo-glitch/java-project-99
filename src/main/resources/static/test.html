<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test API</title>
</head>
<body>
    <h1>Test API</h1>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testUsers()" style="display:none;" id="usersBtn">Test Users</button>
    <pre id="result"></pre>

    <script>
        let token = '';

        async function testLogin() {
            const url = '/api/login';
            const data = { username: 'hexlet@example.com', password: 'qwerty' };
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const text = await res.text();
                document.getElementById('result').textContent = 'Status: ' + res.status + '\nResponse: ' + text;
                
                if (res.status === 200) {
                    token = text;
                    document.getElementById('usersBtn').style.display = 'inline-block';
                }
            } catch(e) {
                document.getElementById('result').textContent = 'Error: ' + e.message;
            }
        }

        async function testUsers() {
            if (!token) {
                document.getElementById('result').textContent = 'Error: No token. Please login first.';
                return;
            }

            try {
                const res = await fetch('/api/users', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const text = await res.text();
                document.getElementById('result').textContent = 'Status: ' + res.status + '\nResponse: ' + text;
            } catch(e) {
                document.getElementById('result').textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
